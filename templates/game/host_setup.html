{% extends 'game/base.html' %}
{% block content %}
<div class="w-full max-w-lg mx-auto">
    <div class="theme-card rounded-3xl p-8 relative overflow-hidden">
        <div class="theme-glow-bottom absolute -top-24 -left-24 w-48 h-48 rounded-full blur-3xl pointer-events-none"></div>

        <h2 class="theme-title text-3xl font-black text-center mb-8">إعدادات اللعبة</h2>

        {% if error_message %}
        <div class="mb-6 rounded-2xl border border-red-400/30 bg-red-500/10 px-5 py-4 text-center text-red-200 font-bold">
            {{ error_message }}
        </div>
        {% endif %}
        
        <form method="post" class="space-y-6 relative z-10">
            {% csrf_token %}
            <div>
                <label class="block theme-muted text-sm font-bold mb-2">وقت السؤال (بالثواني)</label>
                <input type="number" name="timer" value="30" min="10" max="120" class="theme-input w-full p-4 rounded-xl font-bold text-center text-xl transition-all">
            </div>

            <div class="space-y-4">
                <label class="block theme-muted text-sm font-bold">الحروف الموجودة في اللعبة</label>
                <div class="grid grid-cols-2 gap-3">
                    <label class="cursor-pointer">
                        <input type="radio" name="letter_mode" value="all" class="peer sr-only" {% if selected_letter_mode != 'specific' %}checked{% endif %} onchange="toggleLetterMode()">
                        <div class="theme-panel rounded-2xl px-4 py-4 text-center font-bold text-slate-300 transition-all peer-checked:border-amber-300/50 peer-checked:bg-amber-400/10 peer-checked:text-amber-100">
                            جميع الحروف
                        </div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="letter_mode" value="specific" class="peer sr-only" {% if selected_letter_mode == 'specific' %}checked{% endif %} onchange="toggleLetterMode()">
                        <div class="theme-panel rounded-2xl px-4 py-4 text-center font-bold text-slate-300 transition-all peer-checked:border-slate-300/40 peer-checked:bg-slate-200/10 peer-checked:text-slate-100">
                            حروف محددة
                        </div>
                    </label>
                </div>

                <div id="letter-picker" class="theme-panel rounded-3xl p-4 space-y-4 {% if selected_letter_mode != 'specific' %}hidden{% endif %}">
                    <div class="flex items-center justify-between gap-3">
                        <p class="text-sm font-bold theme-muted">اختر الحروف التي تريدها في هذه الجولة</p>
                        <button type="button" onclick="toggleAllLetters(true)" class="text-xs font-bold text-amber-200 hover:text-white transition-colors">تحديد الكل</button>
                    </div>
                    <div class="grid grid-cols-6 sm:grid-cols-7 gap-2">
                        {% for letter in available_letters %}
                        <label class="cursor-pointer">
                            <input type="checkbox" name="selected_letters" value="{{ letter }}" class="peer sr-only letter-checkbox" {% if letter in selected_letters %}checked{% endif %}>
                            <div class="aspect-square rounded-2xl border border-slate-700 bg-slate-950/70 text-slate-300 text-2xl font-black flex items-center justify-center transition-all peer-checked:border-amber-300/60 peer-checked:bg-amber-400/12 peer-checked:text-amber-100">
                                {{ letter }}
                            </div>
                        </label>
                        {% endfor %}
                    </div>
                </div>
            </div>
            
            <div class="relative" id="dropdown-container">
                <label class="block theme-muted text-sm font-bold mb-2">متى تظهر الإجابة الصحيحة؟</label>
                <input type="hidden" name="reveal_setting" id="reveal_input" value="after_question">
                
                <div class="relative">
                    <button type="button" onclick="toggleDropdown()" class="theme-input w-full p-4 rounded-xl font-bold text-right flex justify-between items-center transition-all">
                        <span id="dropdown-selected-text">بعد كل سؤال مباشرة</span>
                        <svg id="dropdown-icon" class="fill-current h-5 w-5 text-slate-500 transition-transform duration-200" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
                    </button>
                    
                    <div id="dropdown-menu" class="absolute z-50 w-full mt-2 bg-slate-950 border border-slate-700 rounded-xl shadow-2xl overflow-hidden opacity-0 invisible transition-all duration-200 transform origin-top -translate-y-2">
                        <button type="button" onclick="selectOption('after_question', 'بعد كل سؤال مباشرة')" class="option-btn w-full p-4 text-right hover:bg-slate-900 text-slate-100 font-bold transition-all border-b border-slate-800 flex justify-between items-center">
                            بعد كل سؤال مباشرة
                            <svg class="h-5 w-5 text-emerald-500 check-icon" id="check-after_question" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                        </button>
                        <button type="button" onclick="selectOption('end_of_game', 'في نهاية اللعبة فقط')" class="option-btn w-full p-4 text-right hover:bg-slate-900 text-slate-400 font-bold transition-all flex justify-between items-center">
                            في نهاية اللعبة فقط
                            <svg class="h-5 w-5 text-emerald-500 check-icon hidden" id="check-end_of_game" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                        </button>
                    </div>
                </div>
            </div>
            
            <div class="pt-4 space-y-3">
                <button type="submit" class="theme-btn-primary w-full py-4 rounded-xl font-black text-xl transition-all">ابدأ غرفة الانتظار</button>
                <a href="{% url 'home' %}" class="theme-btn-outline block w-full py-4 text-center rounded-xl font-bold transition-all">عودة للخلف</a>
            </div>
        </form>
    </div>
</div>

<script>
let isDropdownOpen = false;
let previousLetterMode = document.querySelector('input[name="letter_mode"]:checked')?.value || 'all';

function toggleLetterMode() {
    const isSpecific = document.querySelector('input[name="letter_mode"]:checked')?.value === 'specific';
    document.getElementById('letter-picker').classList.toggle('hidden', !isSpecific);
    if (isSpecific && previousLetterMode !== 'specific') {
        toggleAllLetters(false);
    }
    previousLetterMode = isSpecific ? 'specific' : 'all';
}

function toggleAllLetters(checked) {
    document.querySelectorAll('.letter-checkbox').forEach((checkbox) => {
        checkbox.checked = checked;
    });
}

function toggleDropdown() {
    isDropdownOpen = !isDropdownOpen;
    const menu = document.getElementById('dropdown-menu');
    const icon = document.getElementById('dropdown-icon');
    if (isDropdownOpen) {
        menu.classList.remove('opacity-0', 'invisible', '-translate-y-2');
        icon.classList.add('rotate-180');
    } else {
        menu.classList.add('opacity-0', 'invisible', '-translate-y-2');
        icon.classList.remove('rotate-180');
    }
}

function selectOption(value, text) {
    document.getElementById('reveal_input').value = value;
    document.getElementById('dropdown-selected-text').textContent = text;
    
    // Update checks
    document.querySelectorAll('.check-icon').forEach(el => el.classList.add('hidden'));
    document.getElementById('check-' + value).classList.remove('hidden');
    
    const buttons = document.querySelectorAll('.option-btn');
    buttons.forEach(btn => {
        btn.classList.remove('text-slate-100');
        btn.classList.add('text-slate-500');
    });
    const target = event.currentTarget || event.target.closest('button');
    if(target){
        target.classList.remove('text-slate-500');
        target.classList.add('text-slate-100');
    }
    
    toggleDropdown();
}

// Close when clicking outside
document.addEventListener('click', function(event) {
    if (isDropdownOpen && !event.target.closest('#dropdown-container')) {
        toggleDropdown();
    }
});

toggleLetterMode();
</script>
{% endblock %}
