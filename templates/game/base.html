<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}صفات الحروف الهجائية{% endblock %}</title>
    <!-- Use Google Fonts (Tajawal for Arabic) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Tajawal', 'sans-serif'],
                    },
                    colors: {
                        primary: '#0f766e',
                        secondary: '#f59e0b',
                        dark: '#23404a',
                        card: 'rgba(255, 252, 246, 0.82)',
                    }
                }
            }
        }
    </script>
    
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="text-slate-100 font-sans min-h-screen flex flex-col items-center justify-center p-4 md:p-6">
    <div class="w-full max-w-7xl mx-auto flex justify-center w-full">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
